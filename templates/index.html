<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sid's Farm Demo Launcher</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>

<body>
    <main class="container">
        <section class="card center">
            <h1>Sid's Farm Demo</h1>
            <p>Order acknowledgement demo (GRN / PRN) with QR-based CFA validation.</p>
        </section>

        <section class="split-grid">
            <div class="card center stack">
                <h2>Enter as Manager</h2>
                <button id="create-manager-btn" class="primary">Enter as Store Manager</button>
                <p class="hint">Creates an independent manager session for this run.</p>
            </div>

            <div class="card center stack">
                <h2>Enter as CFA</h2>
                <button id="enter-cfa-btn" class="secondary">Enter as CFA</button>
                <p class="hint">Next screen gives options to scan QR or enter transaction ID.</p>
            </div>
        </section>
    </main>

    <script>
        const createBtn = document.getElementById('create-manager-btn');
        const enterCfaBtn = document.getElementById('enter-cfa-btn');

        createBtn.addEventListener('click', async () => {
            createBtn.disabled = true;
            try {
                const res = await fetch('/api/managers', { method: 'POST' });
                const data = await res.json();
                if (!res.ok) {
                    alert(data.error || 'Unable to create manager session');
                    createBtn.disabled = false;
                    return;
                }
                window.location.href = `/manager/${data.manager_id}`;
            } catch (error) {
                alert('Failed to create session');
                createBtn.disabled = false;
            }
        });

        enterCfaBtn.addEventListener('click', () => {
            window.location.href = '/cfa-entry';
        });
    </script>
</body>

</html>
