<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manager Transaction View</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>

<body>
    <main class="container">
        <section class="card">
            <h1>Store Manager - Transaction</h1>
            <p id="tx-header" class="hint">Loading...</p>
            <div id="table-zone"></div>

            <div class="inline-actions" id="edit-actions"></div>
            <div id="status-message"></div>
        </section>
    </main>

    <script>
        const txId = "{{ tx_id }}";
        const skuList = [
            'buffalo milk 500ml',
            'cow milk 500ml',
            'curd pouch 480g',
            'buffalo curd 400g',
            'paneer 200g'
        ];
        let txData = null;
        let hasUnsavedChanges = false;
        let activeCameraRowIdx = null;
        let activeCameraStream = null;

        function stopCameraStream() {
            if (activeCameraStream) {
                activeCameraStream.getTracks().forEach(track => track.stop());
                activeCameraStream = null;
            }
        }

        function closeCameraPanel() {
            stopCameraStream();
            const panel = document.getElementById('camera-panel');
            if (panel) {
                panel.classList.add('hidden');
            }
            const video = document.getElementById('camera-video');
            if (video) {
                video.srcObject = null;
            }
            activeCameraRowIdx = null;
        }

        async function openCameraForRow(idx) {
            activeCameraRowIdx = idx;
            const panel = document.getElementById('camera-panel');
            const video = document.getElementById('camera-video');

            if (!panel || !video) {
                return;
            }

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                const fallbackInput = document.querySelector(`[data-field="image"][data-idx="${idx}"]`);
                if (fallbackInput) {
                    fallbackInput.click();
                }
                return;
            }

            try {
                stopCameraStream();
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false,
                });
                activeCameraStream = stream;
                video.srcObject = stream;
                panel.classList.remove('hidden');
            } catch (error) {
                const fallbackInput = document.querySelector(`[data-field="image"][data-idx="${idx}"]`);
                if (fallbackInput) {
                    fallbackInput.click();
                }
            }
        }

        function getConfirmMeta(row) {
            if (row.confirmed) {
                return { label: 'Confirmed', className: 'ok' };
            }
            if (row.changed) {
                return { label: 'Value changed', className: 'warn' };
            }
            return { label: 'Confirm', className: 'warn' };
        }

        function markDirty() {
            hasUnsavedChanges = true;
            const msg = document.getElementById('status-message');
            if (msg && txData?.status !== 'completed') {
                msg.className = 'warning';
                msg.textContent = 'Unsaved edits in progress. Auto-refresh paused until you save and regenerate.';
            }
        }

        function renderTable() {
            const isGRN = txData.note_type === 'GRN';
            const headers = isGRN
                ? '<th>SKU</th><th>Ordered Qty</th><th>Received Qty</th><th>Confirm</th><th>Delete</th>'
                : '<th>SKU</th><th>Return Qty</th><th>Take Picture</th><th>Confirm</th><th>Delete</th>';

            const rows = txData.items.map((item, idx) => {
                const confirmMeta = getConfirmMeta(item);
                if (isGRN) {
                    const skuOptions = skuList.map(sku => `<option value="${sku}" ${item.sku === sku ? 'selected' : ''}>${sku}</option>`).join('');
                    return `
            <tr>
              <td><select data-field="sku" data-idx="${idx}">${skuOptions}</select></td>
              <td><input type="number" min="0" value="${item.ordered_qty || 0}" data-field="ordered_qty" data-idx="${idx}" /></td>
              <td><input type="number" min="0" value="${item.received_qty || 0}" data-field="received_qty" data-idx="${idx}" /></td>
                            <td><button data-action="confirm" data-idx="${idx}" class="tiny ${confirmMeta.className}">${confirmMeta.label}</button></td>
              <td><button data-action="delete" data-idx="${idx}" class="tiny danger">Delete</button></td>
            </tr>
          `;
                }

                return `
          <tr>
            <td>${item.sku}</td>
            <td><input type="number" min="1" value="${item.return_qty || 1}" data-field="return_qty" data-idx="${idx}" /></td>
                        <td>
                                                        <button class="tiny secondary" data-action="take-pic" data-idx="${idx}">Take Picture</button>
                                                        <input class="hidden" type="file" accept="image/*" capture="environment" data-field="image" data-idx="${idx}" />
                            <small>${item.image_name || '-'}</small>
                            ${item.image_preview ? `<img class="preview-thumb" src="${item.image_preview}" alt="Uploaded image preview" />` : ''}
                        </td>
                        <td><button data-action="confirm" data-idx="${idx}" class="tiny ${confirmMeta.className}">${confirmMeta.label}</button></td>
                        <td><button data-action="delete" data-idx="${idx}" class="tiny danger">Delete</button></td>
          </tr>
        `;
            }).join('');

            document.getElementById('table-zone').innerHTML = `
        <div class="table-wrap">
          <table>
            <thead><tr>${headers}</tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
                                ${!isGRN ? '<div id="camera-panel" class="camera-panel hidden"><video id="camera-video" autoplay playsinline></video><div class="inline-actions"><button id="capture-photo-btn" class="primary" type="button">Capture</button><button id="close-camera-btn" class="danger" type="button">Close Camera</button></div></div>' : ''}
                ${isGRN ? '<div class="inline-actions"><button id="add-grn-row" class="secondary">Add GRN Row</button></div>' : ''}
      `;

            bindTableEvents();
        }

        function bindTableEvents() {
            document.querySelectorAll('[data-field="ordered_qty"], [data-field="received_qty"], [data-field="return_qty"]').forEach(input => {
                input.addEventListener('input', (e) => {
                    const idx = Number(e.target.dataset.idx);
                    const field = e.target.dataset.field;
                    markDirty();
                    txData.items[idx][field] = Number(e.target.value || 0);
                    txData.items[idx].changed = true;
                    txData.items[idx].confirmed = false;
                    renderTable();
                });
            });

            document.querySelectorAll('[data-field="sku"]').forEach(select => {
                select.addEventListener('change', (e) => {
                    const idx = Number(e.target.dataset.idx);
                    markDirty();
                    txData.items[idx].sku = e.target.value;
                    txData.items[idx].product = e.target.value;
                    txData.items[idx].changed = true;
                    txData.items[idx].confirmed = false;
                    renderTable();
                });
            });

            document.querySelectorAll('[data-action="take-pic"]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = Number(e.target.dataset.idx);
                    openCameraForRow(idx);
                });
            });

            const captureBtn = document.getElementById('capture-photo-btn');
            if (captureBtn) {
                captureBtn.addEventListener('click', () => {
                    if (activeCameraRowIdx === null) {
                        return;
                    }
                    const video = document.getElementById('camera-video');
                    if (!video || !video.videoWidth) {
                        return;
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const context = canvas.getContext('2d');
                    if (!context) {
                        return;
                    }
                    context.drawImage(video, 0, 0, canvas.width, canvas.height);
                    markDirty();
                    txData.items[activeCameraRowIdx].image_preview = canvas.toDataURL('image/jpeg', 0.9);
                    txData.items[activeCameraRowIdx].image_name = `capture_${Date.now()}.jpg`;
                    txData.items[activeCameraRowIdx].changed = true;
                    txData.items[activeCameraRowIdx].confirmed = false;
                    closeCameraPanel();
                    renderTable();
                });
            }

            const closeCameraBtn = document.getElementById('close-camera-btn');
            if (closeCameraBtn) {
                closeCameraBtn.addEventListener('click', () => {
                    closeCameraPanel();
                });
            }

            document.querySelectorAll('[data-field="image"]').forEach(fileInput => {
                fileInput.addEventListener('change', (e) => {
                    const idx = Number(e.target.dataset.idx);
                    const file = e.target.files?.[0];
                    markDirty();
                    txData.items[idx].image_name = file ? file.name : '';
                    txData.items[idx].image_preview = file ? URL.createObjectURL(file) : '';
                    txData.items[idx].changed = true;
                    txData.items[idx].confirmed = false;
                    renderTable();
                });
            });

            document.querySelectorAll('[data-action="confirm"]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = Number(e.target.dataset.idx);
                    markDirty();
                    txData.items[idx].confirmed = true;
                    txData.items[idx].changed = false;
                    renderTable();
                });
            });

            document.querySelectorAll('[data-action="delete"]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (txData.note_type === 'PRN' && txData.items.length <= 1) {
                        alert('At least one PRN row is required.');
                        return;
                    }
                    const idx = Number(e.target.dataset.idx);
                    markDirty();
                    txData.items.splice(idx, 1);
                    renderTable();
                });
            });

            const addGrnRowBtn = document.getElementById('add-grn-row');
            if (addGrnRowBtn) {
                addGrnRowBtn.addEventListener('click', () => {
                    markDirty();
                    txData.items.push({ sku: skuList[0], product: skuList[0], ordered_qty: 0, received_qty: 0, confirmed: false, changed: false, image_name: '' });
                    renderTable();
                });
            }
        }

        function allRowsConfirmed() {
            return txData.items.length && txData.items.every(item => item.confirmed);
        }

        async function saveAndRegenerate() {
            if (!allRowsConfirmed()) {
                alert('Confirm all rows before regenerating QR');
                return;
            }

            const updateRes = await fetch(`/api/transactions/${txId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items: txData.items })
            });
            const updated = await updateRes.json();
            if (!updateRes.ok) {
                alert(updated.error || 'Unable to update transaction');
                return;
            }
            hasUnsavedChanges = false;
            txData = updated;

            const qrRes = await fetch(`/api/transactions/${txId}/generate-qr`, { method: 'POST' });
            const qrData = await qrRes.json();
            if (!qrRes.ok) {
                alert(qrData.error || 'Unable to regenerate QR');
                return;
            }

            window.location.href = `/manager-qr/${txId}`;
        }

        function renderActions() {
            const actions = document.getElementById('edit-actions');
            const msg = document.getElementById('status-message');

            if (txData.status === 'completed') {
                actions.innerHTML = '';
                msg.className = 'success';
                msg.textContent = 'Transaction completed acknowledgement received.';
                return;
            }

            if (txData.status === 'disputed') {
                msg.className = 'warning';
                msg.textContent = `Disputed by CFA: ${txData.cfa_note || 'No note'}`;
            } else {
                msg.className = 'hint';
                msg.textContent = txData.cfa_note ? `CFA note: ${txData.cfa_note}` : '';
            }

            actions.innerHTML = '<button id="regen-btn" class="primary">Save Changes & Regenerate QR</button>';
            document.getElementById('regen-btn').addEventListener('click', saveAndRegenerate);
        }

        async function loadTransaction() {
            if (hasUnsavedChanges) {
                return;
            }

            closeCameraPanel();

            const res = await fetch(`/api/transactions/${txId}`);
            const tx = await res.json();
            if (!res.ok) {
                document.getElementById('tx-header').textContent = tx.error || 'Transaction not found';
                return;
            }

            txData = tx;
            txData.items = txData.items.map(item => ({ ...item, changed: false }));
            hasUnsavedChanges = false;
            document.getElementById('tx-header').textContent = `${tx.tx_id} | ${tx.note_type} | status: ${tx.status}`;
            renderTable();
            renderActions();

        }

        loadTransaction();
        setInterval(loadTransaction, 2500);
    </script>
</body>

</html>
